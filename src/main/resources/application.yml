spring:
  application:
    name: loan-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pesa_lending}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: 8083
  servlet:
    context-path: /api/loans

logging:
  level:
    root: INFO
    com.pesa: DEBUG

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production}

loan:
  policy:
    application-fee-pct: 5.0
    monthly-interest-rate-pct: 3.5
    monthly-penalty-rate-pct: 5.0
    completed-loan-step-up-one: 1.25
    completed-loan-step-up-three: 1.50
    utilization-factor-medium: 0.75
    utilization-factor-high: 0.50
    recommended-amount-ratio: 0.60
    products:
      - id: instant
        code: INSTANT
        name: Mkopo wa Haraka
        category: instant
        min-amount: 50000
        max-amount: 500000
        min-term-days: 7
        max-term-days: 30
      - id: emergency
        code: EMERGENCY
        name: Mkopo wa Dharura
        category: emergency
        min-amount: 100000
        max-amount: 1500000
        min-term-days: 14
        max-term-days: 90
      - id: business
        code: BUSINESS
        name: Mkopo wa Biashara
        category: business
        min-amount: 300000
        max-amount: 5000000
        min-term-days: 30
        max-term-days: 360

credit:
  provider:
    enabled: ${CREDIT_PROVIDER_ENABLED:false}
    mock: ${CREDIT_PROVIDER_MOCK:true}
    base-url: ${CREDIT_PROVIDER_BASE_URL:}
    api-key: ${CREDIT_PROVIDER_API_KEY:}

payment:
  service:
    base-url: ${PAYMENT_SERVICE_BASE_URL:http://localhost:8082/api/payments}
    default-currency: ${PAYMENT_SERVICE_CURRENCY:TZS}
    default-channel: ${PAYMENT_SERVICE_CHANNEL:INTERNAL_WALLET}
  events:
    topic: ${PAYMENT_EVENTS_TOPIC:payment.events.v1}
    group-id: ${PAYMENT_EVENTS_GROUP_ID:loan-service}
