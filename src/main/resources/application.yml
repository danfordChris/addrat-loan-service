spring:
  application:
    name: loan-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pesa_lending}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8083
  servlet:
    context-path: /api/loans

logging:
  level:
    root: INFO
    com.pesa: DEBUG

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production}

loan:
  default-product: STANDARD
  products:
    STANDARD:
      application-fee: 5.0
      monthly-interest-rate: 3.5
      monthly-penalty-rate: 5.0

credit:
  provider:
    enabled: ${CREDIT_PROVIDER_ENABLED:false}
    mock: ${CREDIT_PROVIDER_MOCK:true}
    base-url: ${CREDIT_PROVIDER_BASE_URL:}
    api-key: ${CREDIT_PROVIDER_API_KEY:}
